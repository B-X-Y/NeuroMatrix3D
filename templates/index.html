<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroMatrix3D</title>
    <link rel="icon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css" rel="stylesheet"/>
    <script>
        (function () {
            const savedTheme = localStorage.getItem("theme");
            const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
            const theme = savedTheme || (prefersDark ? "dark" : "light");
            document.documentElement.setAttribute("data-bs-theme", theme);
        })();
    </script>
</head>
<body>
<div class="page">
    <div class="container container-tight py-5">
        <div class="d-flex justify-content-end mb-3">
            <label class="form-check form-switch m-0" for="theme-toggle">
                <input class="form-check-input" type="checkbox" id="theme-toggle">
                <span class="form-check-label">Dark mode</span>
            </label>
        </div>
        <div class="text-center mb-4">
            <h1 class="display-5 fw-bold">NeuroMatrix3D</h1>
            <p class="text-secondary">
                Source code:
                <a href="https://github.com/B-X-Y/NeuroMatrix3D" target="_blank" rel="noopener noreferrer">
                    GitHub Repository
                </a>
            </p>
        </div>
        <div class="card shadow-sm">
            <div class="card-body">
                <form action="/generate" method="POST" target="_blank">
                    <div class="mb-4">
                        <label class="form-label">Input Text</label>
                        <textarea class="form-control" name="text" rows="10"
                                  placeholder="Enter text to generate braille model..."></textarea>
                    </div>
                    <details class="mb-4">
                        <summary class="fw-bold mb-3">Advanced Parameters</summary>
                        <div class="row g-3 mt-2">
                            <div class="col-md-6">
                                <label class="form-label">Dot Radius</label>
                                <input type="number" class="form-control" name="dot_radius" step="any">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Dot Spacing</label>
                                <input type="number" class="form-control" name="dot_spacing" step="any">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Row Spacing</label>
                                <input type="number" class="form-control" name="row_spacing" step="any">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Column Spacing</label>
                                <input type="number" class="form-control" name="column_spacing" step="any">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Page Thickness</label>
                                <input type="number" class="form-control" name="page_thickness" step="any">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Max Page Width</label>
                                <input type="number" class="form-control" name="max_page_width" step="any">
                            </div>
                        </div>
                    </details>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            Generate Braille Model
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/js/tabler.min.js"></script>
<script src="{{ url_for("static", filename="js/theme-toggle.js") }}"></script>
</body>
</html>
