<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <title>NeuroMatrix3D</title>
</head>
<body>
<h1>NeuroMatrix3D</h1>
<form action="/generate" method="POST" target="_blank">
    <label>
        <textarea name="text" rows="10" cols="50"></textarea>
    </label>
    <br>
    <details>
        <summary>Advanced Parameters</summary>
        <p>Dot Radius: <label>
            <input type="number" name="dot_radius" step="any">
        </label></p>
        <p>Dot Spacing: <label>
            <input type="number" name="dot_spacing" step="any">
        </label></p>
        <p>Row Spacing: <label>
            <input type="number" name="row_spacing" step="any">
        </label></p>
        <p>Column Spacing: <label>
            <input type="number" name="column_spacing" step="any">
        </label></p>
        <p>Page Thickness: <label>
            <input type="number" name="page_thickness" step="any">
        </label></p>
        <p>Max Page Width: <label>
            <input type="number" name="max_page_width" step="any">
        </label></p>
    </details>
    <br>
    <button type="submit">Generate Braille Model</button>
</form>
</body>
</html>
