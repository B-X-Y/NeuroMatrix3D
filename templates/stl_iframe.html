<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>{{ model_id }}.stl Viewer</title>
    <link rel="stylesheet" href="{{ url_for("static", filename="css/stl_viewer.css") }}"/>
</head>
<body class="iframe-body">
<div id="viewer"></div>
<div id="loading" class="loading">Loading model...</div>
<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@latest/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@latest/examples/jsm/"
        }
    }
</script>
<script>
    window.STL_VIEWER_CONFIG = {
        stlUrl: {{ stl_url | tojson }}
    };
</script>
<script type="module" src="{{ url_for("static", filename="js/stl_iframe.js") }}"></script>
</body>
</html>
