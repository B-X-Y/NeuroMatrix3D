<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text to Braille STL Generator for 3D Printing | NeuroMatrix3D</title>
    <link rel="icon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css" rel="stylesheet"/>
    <script>
        (function () {
            const savedTheme = localStorage.getItem("theme");
            const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
            const theme = savedTheme || (prefersDark ? "dark" : "light");
            document.documentElement.setAttribute("data-bs-theme", theme);
        })();
    </script>
</head>
<body data-status-url="{{ url_for("generation_status", job_id=job_id) }}">
<div class="page">
    <div class="container container-tight py-5">
        <div class="d-flex justify-content-end mb-3">
            <label class="form-check form-switch m-0" for="theme-toggle">
                <input class="form-check-input" type="checkbox" id="theme-toggle">
                <span class="form-check-label">Dark mode</span>
            </label>
        </div>
        <div class="text-center mb-4">
            <h1 class="display-5 fw-bold">NeuroMatrix3D</h1>
            <p class="text-secondary">
                Source code:
                <a href="https://github.com/B-X-Y/NeuroMatrix3D" target="_blank" rel="noopener noreferrer">
                    GitHub Repository
                </a>
            </p>
        </div>
        <div class="card shadow-sm">
            <div class="card-body text-center py-5">
                <div id="loading-spinner" class="mb-4">
                    <div class="spinner-border text-primary" role="status"></div>
                </div>
                <div id="generating-status" class="text-secondary fs-3"></div>
                <div id="generation-error" class="alert alert-danger mt-4" role="alert" hidden></div>
                <a href="/download/{{ filename }}" id="download-link" class="btn btn-success btn-lg mt-4" hidden>
                    Download Braille Model
                </a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/js/tabler.min.js"></script>
<script src="{{ url_for("static", filename="js/theme-toggle.js") }}"></script>
<script src="{{ url_for("static", filename="js/download-status.js") }}"></script>
</body>
</html>
